{% extends 'base.html' %}

{% block container %}
<main class="formPage">
    <div class="formCard">
        <h2>Edit Book</h2>
        <p class="formSubtitle">Update the details for "{{ book.title }}" and save.</p>

        <form method="POST" action="{{ url_for('edit_book', bookId=book.bookId) }}">

            <label>Title</label>
            <input type="text" name="title" value="{{ book.title }}" required>

            <label>Author</label>
            <input type="text" name="author" value="{{ book.author }}" required>

            <label>ISBN</label>
            <input type="text" name="isbn" value="{{ book.isbn }}" required>

            <label>Price ($)</label>
            <input type="number" step="0.01" min="0" name="price" value="{{ '%.2f'|format(book.price) }}" required>

            <label>Image filename</label>
            <input type="text" name="image" value="{{ book.image }}" placeholder="example.jpg" required>

            <label>Category</label>
            <select name="categoryId" required>
                {% for cat in categories %}
                    <option value="{{ cat.categoryId }}"
                        {% if cat.categoryId == book.categoryId %}selected{% endif %}>
                        {{ cat.categoryName }}
                    </option>
                {% endfor %}
            </select>

            <label class="checkboxRow">
                <input type="checkbox" name="readNow" value="1"
                    {% if book.readNow == 1 %}checked{% endif %}>
                Available to Read Now
            </label>

            <div class="formActions">
                <button type="submit" class="actionButton primary">Save changes</button>
                <a class="actionButton secondary" href="{{ url_for('book_detail', bookId=book.bookId) }}">Cancel</a>
            </div>

        </form>
    </div>
</main>
{% endblock %}
