{% extends 'base.html' %}

{% block container %}
<main class="formPage">
    <div class="formCard">
        <h2>Add a New Book</h2>
        <p class="formSubtitle">Fill out the details below to add a new book to The Bookshelf.</p>

        <form method="POST">

            <label>Title</label>
            <input type="text" name="title" required>

            <label>Author</label>
            <input type="text" name="author" required>

            <label>ISBN</label>
            <input type="text" name="isbn" required>

            <label>Price ($)</label>
            <input type="number" step="0.01" min="0" name="price" required>

            <label>Image filename</label>
            <input type="text" name="image" placeholder="example.jpg" required>

            <label>Category</label>
            <select name="categoryId" required>
                {% for cat in categories %}
                    <option value="{{ cat.categoryId }}">{{ cat.categoryName }}</option>
                {% endfor %}
            </select>

            <label class="checkboxRow">
                <input type="checkbox" name="readNow" value="1">
                Available to Read Now
            </label>

            <div class="formActions">
                <button type="submit" class="actionButton primary">Add Book</button>
                <a class="actionButton secondary" href="{{ url_for('home') }}">Cancel</a>
            </div>

        </form>
    </div>
</main>
{% endblock %}
