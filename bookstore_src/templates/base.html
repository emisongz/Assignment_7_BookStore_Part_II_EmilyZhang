<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vellum &amp; Ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  </head>
  <body>
    <header>
      <div id="leftHeader">
        <a href="{{ url_for('home') }}" class="brand">
          <span class="brandMark">&#x1F56F;</span>
          <span class="brandText">
            <span class="brandName">Vellum &amp; Ink</span>
            <span class="brandTagline">reads for the candlelit study</span>
          </span>
        </a>
      </div>

      <div id="midHeader">
        <form id="searchBoxForm" action="{{ url_for('search') }}" method="post">
          <input id="searchBox" type="text" placeholder="Search by book title..." name="search">
          <button id="searchIcon" type="submit" aria-label="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </form>

        <div class="dropdown">
          <p class="dropdownSelect">Browse categories &#x25BE;</p>
          <div class="dropdownContent">
            {% for category in categories %}
              <p>
                <a href="{{ url_for('category', categoryId=category.categoryId) }}">
                  {{ category.categoryName }}
                </a>
              </p>
            {% endfor %}
          </div>
        </div>
      </div>

      <div id="rightHeader">
        <a class="navLink" href="{{ url_for('read_now') }}">Read Now</a>
        <a class="navLink" href="#">Cart</a>
        <a class="navLink" href="#">Sign in</a>
        <a class="navLink primary" href="{{ url_for('add_book') }}">+ Add Book</a>
      </div>
    </header>

    <div class="pageShell">{% block container %}{% endblock %}</div>

    <footer>
      <div id="footerLeft">
        <p class="footerBrand">Vellum &amp; Ink</p>
        <p class="footerCopy">&copy; 2026 &middot; ex libris, ad infinitum</p>
      </div>
      <div id="footerLinks">
        <a href="#">Contact</a>
        <a href="#">About</a>
        <a href="#">Privacy</a>
      </div>
    </footer>
  </body>
</html>
